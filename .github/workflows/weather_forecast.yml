# GitHub Actions Workflow: Weather Forecast Telegram Notifier
#
# Runs daily at 07:00 (Taiwan time = UTC 23:00前一天) to fetch weather
# forecast and send it to your Telegram chat.
#
# Required Secrets:
#   TELEGRAM_BOT_TOKEN   - Telegram Bot API token (from @BotFather)
#   TELEGRAM_CHAT_ID     - Target chat/group ID
#   CWB_API_KEY          - (optional) CWB API key if using source=cwb
#
# Optional variables (set in the workflow or as secrets):
#   WEATHER_LOCATION     - City name, e.g. "臺北市" (default)
#   WEATHER_SOURCE       - "openmeteo" (default) or "cwb"
#   DETAIL_LEVEL         - "full" (default), "standard", or "basic"

name: Weather Forecast Notifier

on:
  schedule:
    # Run daily at 07:00 AM Taiwan time (UTC 23:00 previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:      # Allow manual trigger from GitHub UI
    inputs:
      location:
        description: 'City name (e.g. 臺北市)'
        required: false
        default: '臺北市'
      source:
        description: 'Data source: openmeteo or cwb'
        required: false
        default: 'openmeteo'
      detail:
        description: 'Detail level: full, standard, or basic'
        required: false
        default: 'full'

env:
  PYTHON_VERSION: '3.11'

jobs:
  send-forecast:
    name: Fetch & Send Weather Forecast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weather notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          CWB_API_KEY:        ${{ secrets.CWB_API_KEY }}
          WEATHER_LOCATION:   ${{ github.event.inputs.location || '臺北市' }}
          WEATHER_SOURCE:     ${{ github.event.inputs.source || 'openmeteo' }}
          DETAIL_LEVEL:       ${{ github.event.inputs.detail || 'full' }}
        run: |
          python -m src.main
