# GitHub Actions Workflow: Weather Forecast Telegram Notifier
#
# Runs daily at 07:00 (Taiwan time = UTC 23:00 previous day).
# Configuration is driven by config.yaml in the repository root.
#
# Required Secrets:
#   TELEGRAM_BOT_TOKEN   - Telegram Bot API token (from @BotFather)
#   TELEGRAM_CHAT_ID     - Target chat/group ID
#   CWB_API_KEY          - (optional) CWB API key for CWB data source

name: Weather Forecast Notifier

on:
  schedule:
    # Run daily at 07:00 AM Taiwan time (UTC 23:00 previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:      # Allow manual trigger from GitHub UI
    inputs:
      location:
        description: 'Override city name (e.g. 臺北市)'
        required: false
        default: ''
      detail:
        description: 'Override detail level: full, standard, or basic'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  send-forecast:
    name: Fetch & Send Weather Forecast
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install system deps (Chromium + emoji font)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium fonts-noto-color-emoji
          npm install puppeteer-core

      - name: Run weather notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          CWB_API_KEY:        ${{ secrets.CWB_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.location }}" ]; then
            ARGS="$ARGS --location ${{ github.event.inputs.location }}"
          fi
          if [ -n "${{ github.event.inputs.detail }}" ]; then
            ARGS="$ARGS --detail ${{ github.event.inputs.detail }}"
          fi
          python -m src.main $ARGS
